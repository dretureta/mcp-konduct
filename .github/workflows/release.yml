name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci && npm install --prefix src/web/client

      - name: Build
        run: npm run build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p 'require("./package.json").version')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p release
          tar -czf release/mcp-konduct-${{ steps.version.outputs.VERSION }}.tar.gz \
            --transform "s|^dist/cli|.|" \
            dist/cli/ \
            dist/web/client/index.html \
            dist/web/client/assets/ \
            package.json \
            README.md
          ls -la release/

      - name: Create tag
        run: |
          TAG_NAME="v${{ steps.version.outputs.VERSION }}"
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "Created and pushed tag $TAG_NAME"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: true
          files: |
            release/mcp-konduct-${{ steps.version.outputs.VERSION }}.tar.gz
